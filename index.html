<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Whispers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- FLOATING BACKGROUND FLOWERS -->
    <div class="flower-bg top-left">🌸</div>
    <div class="flower-bg bottom-right">🦋</div>
    <div class="flower-bg top-right">🌿</div>
    <div class="flower-bg bottom-left">🪻</div>

    <div class="container">
        
        <!-- PAGE 1: LOGIN -->
        <div id="login-page" class="page active">
            <h2>Welcome, Beautiful Soul</h2>
            <p>Please enter your details to continue</p>
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="username" placeholder="Enter your name...">
            </div>
            <div class="input-group">
                <label>Secret Password</label>
                <input type="password" id="password" placeholder="Enter password...">
            </div>
            <button onclick="checkPassword()">Enter Garden</button>
            <p id="login-error" class="error"></p>
            
            <!-- NEW SECRET ADMIN LINK FOR JOEL ONLY -->
            <span class="admin-link" onclick="openAdminPanel()">✨ (For Admin Only) ✨</span>
        </div>

        <!-- PAGE 2: QUESTIONNAIRE -->
        <div id="question-page" class="page">
            <h2>Blossom Questions</h2>
            <p>Answer honestly...</p>
            
            <form id="quiz-form" onsubmit="submitAnswers(event)">
                <div class="input-group">
                    <label>1. What is the maximum number of days you have worn the exact same outfit while convincing yourself it "smells fine"?</label>
                    <input type="text" id="q1" required>
                </div>
                
                <div class="input-group">
                    <label>2. What popular movie do you pretend to love just so people don't look at you like you're an alien?</label>
                    <input type="text" id="q2" required>
                </div>
                
                <div class="input-group">
                    <label>3. What is the most awkward, blatant lie you’ve told a stranger because you panicked during small talk?</label>
                    <input type="text" id="q3" required>
                </div>
                
                <div class="input-group">
                    <label>4. What is a topic you know absolutely nothing about, but you will still argue to the death just to be right?</label>
                    <input type="text" id="q4" required>
                </div>
                
                <div class="input-group">
                    <label>5. What is a piece of advice you gave someone that you knew was terrible, but you just wanted to see what would happen?</label>
                    <textarea id="q5" rows="3" required></textarea>
                </div>

                <button type="submit">Submit Answers</button>
            </form>
        </div>

        <!-- PAGE 3: BEAUTIFUL USER SUCCESS SCREEN -->
        <div id="success-page" class="page">
            <div class="emoji-big">👌👌</div>
            <h1 class="done-text">THANK YOU</h1>
            <div class="tick-mark">✓ Done</div>
        </div>

        <!-- PAGE 4: BEAUTIFUL ADMIN POSTCARD PANEL -->
        <div id="admin-page" class="page">
            <h2>Garden Subscriptions</h2>
            <p>Secrets told by beautiful souls:</p>
            <div id="responses-container">
                <!-- User responses will slide here -->
            </div>
            
            <button onclick="clearAllData()" class="wipe-btn">Clear Garden Memory 🗑️</button>
            <button onclick="goBackToLogin()" class="back-btn">Back to Login</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
